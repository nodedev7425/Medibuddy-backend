{% extends "base.html" %}
{% load static %}

{% block content %}

<section class="py-8 px-14">

    <h1 class="text-2xl font-bold mb-6">
        Deine Devices
    </h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        {% for device in devices %}

        <a href="{% url 'device-detail' device.device_id %}" class="bg-light p-4 rounded-xl shadow hover:shadow-lg transition flex items-center justify-center flex-col">

            <img src="{% static 'icons/device.svg' %}"
                 class="w-30 h-30">

            <h2 class="font-bold text-lg">
                {{ device.name }}
            </h2>

            <p class="text-gray-500 text-sm">
                Online
            </p>

        </a>

        {% empty %}

        <p>Keine Devices gefunden.</p>
        {% endfor %}

    </div>

</section>

{% endblock %}
