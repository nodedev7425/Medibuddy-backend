{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Medibuddy</title>
        <link rel="stylesheet" href="{% static 'css/output.css' %}">
    </head>

    <body class="bg-gray-100">

        <nav class="bg-light shadow px-6 py-4 flex justify-between items-center">

            <div class="font-semibold text-gray-700">
                {{ request.user.username }}
            </div>

        <form method="post" action="/login/">
                {% csrf_token %}
                <div class="flex flex-row items-center gap-1.5">
                    <button class="text-black hover:text-gray-700 font-bold">Logout</button>
                    <img src="{% static 'icons/user.svg' %}" class="w-6 h-6 inline-block">
                </div>
            </form>

        </nav>

        <div class="p-6">
            {% block content %}
            {% endblock %}
        </div>

    </body>
</html>
